[general]
app_name = PUXAI
data_dir = ./app/data
default_workspace = .

[features]
enable_ai = true
ai_backend = ollama
enable_tasks = true
enable_notes = true
enable_outlook = true
enable_history_panel = true
enable_tray_icon = false
window_mode = web
transparent_background = false

[web]
host = 127.0.0.1
port = 8787
debug = false
auto_open_browser = true
open_browser_delay_seconds = 1.0

[ollama]
url = http://192.168.1.249:11434
model = llama3.2
agent_model = llama3.2
request_timeout_seconds = 360

[chatgpt]
api_key_env_var = OPENAI_API_KEY
model = gpt-4.1-mini
timeout_seconds = 60

[copilot]
enabled = false
tenant_id = YOUR_TENANT_ID
client_id = YOUR_CLIENT_ID
client_secret_env_var = COPILOT_CLIENT_SECRET

[outlook]
enabled = true
default_task_folder = Tasks
read_inbox_folder = Inbox
max_emails = 20
