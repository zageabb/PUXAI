[general]
app_name = Local Assistant
data_dir = ./app/data

[features]
enable_ai = true
ai_backend = chatgpt
enable_tasks = true
enable_notes = true
enable_outlook = true
enable_history_panel = true
enable_tray_icon = true

[chatgpt]
api_key_env_var = OPENAI_API_KEY
model = gpt-4.1-mini
timeout_seconds = 60

[copilot]
enabled = false
tenant_id = YOUR_TENANT_ID
client_id = YOUR_CLIENT_ID
client_secret_env_var = COPILOT_CLIENT_SECRET

[outlook]
enabled = true
default_task_folder = Tasks
read_inbox_folder = Inbox
max_emails = 20
